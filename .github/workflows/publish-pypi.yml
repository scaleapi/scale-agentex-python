# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to PyPI in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/scaleapi/scale-agentex-python/actions/workflows/publish-pypi.yml
name: Publish PyPI
on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - agentex-client
          - agentex-sdk

  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: '0.10.2'

      - name: Publish to PyPI
        run: |
          bash ./bin/publish-pypi
        env:
          # Heavy `agentex-sdk` package token (existing PyPI name).
          AGENTEX_PYPI_TOKEN: ${{ secrets.AGENTEX_PYPI_TOKEN }}
          # Slim `agentex-client` package token (new PyPI name; needs
          # to be added to repo secrets when the slim is registered).
          AGENTEX_CLIENT_PYPI_TOKEN: ${{ secrets.AGENTEX_CLIENT_PYPI_TOKEN }}
          # Back-compat fallback — used by bin/publish-pypi when the
          # dedicated tokens above are unset.
          PYPI_TOKEN: ${{ secrets.AGENTEX_PYPI_TOKEN || secrets.PYPI_TOKEN }}
          # Manual dispatches can override tag-derived package selection.
          PYPI_PACKAGE: ${{ inputs.package }}
