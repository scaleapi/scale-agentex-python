        agent_id:
          type: string
          title: Agent Id
          description: The UUID of the agent
        created_at:
          type: string
          format: date-time
          title: Created At
          description: When the agent API key was created
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
