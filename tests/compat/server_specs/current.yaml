    post:
      tags:
      - task-retention
      summary: Export Task To Url
      description: 'Build the task snapshot and PUT it to a caller-supplied presigned
        URL.


        Use this when the snapshot is too large for a JSON response body (long

        conversations, deep reasoning content, many attachments). The upload URL

        must be https and resolve to a public address — see SSRF guard.'
      operationId: export_task_to_url_tasks__task_id__export_post
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportTaskToUrlRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportTaskToUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tasks/{task_id}/clean:
    post:
      tags:
      - task-retention
      summary: Clean Task
      description: 'Delete content-bearing rows for a stale task.


        Refuses on active tasks, in-flight workflows, or unprocessed events

        regardless of `force`. The `force=true` flag only bypasses the

        idle-threshold check.'
      operationId: clean_task_tasks__task_id__clean_post
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanTaskRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CleanTaskResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tasks/{task_id}/rehydrate:
    post:
      tags:
      - task-retention
      summary: Rehydrate Task
      description: 'Restore content-bearing rows from a snapshot.


        Two modes:

        - Inline: caller provides messages and task_states in the request body.

        - URL: caller provides snapshot_url; Agentex downloads and parses it.


        Refuses if the task isn''t currently in a cleaned state, or if any supplied

        message/state ID already exists in Mongo (catches double-rehydrate).'
      operationId: rehydrate_task_tasks__task_id__rehydrate_post
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RehydrateTaskRequest'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
