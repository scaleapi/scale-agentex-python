            : \"Exclude\",\n      \"type\": \"boolean\"\n    }\n  },\n  \"title\"\
            : \"TaskMessageEntityFilter\",\n  \"type\": \"object\"\n}\n\nEach filter\
            \ can include:\n- `content`: Filter by message content (type, author,\
            \ data fields)\n- `streaming_status`: Filter by status (\"IN_PROGRESS\"\
            \ or \"DONE\")\n- `exclude`: If true, excludes matching messages (default:\
            \ false)\n\nMultiple filters are combined: inclusionary filters (exclude=false)\
            \ are OR'd together,\nexclusionary filters (exclude=true) are OR'd and\
