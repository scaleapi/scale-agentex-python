                $ref: '#/components/schemas/TaskMessage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Messages
      summary: List Messages
      description: 'List messages for a task with offset-based pagination.


        For cursor-based pagination with infinite scroll support, use /messages/paginated.'
      operationId: list_messages_messages_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: page_number
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Page Number
      - name: order_by
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Order By
      - name: order_direction
        in: query
        required: false
        schema:
          type: string
          default: desc
          title: Order Direction
      - name: filters
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: "JSON-encoded array of TaskMessageEntityFilter objects.\n\n\
            Schema: {\n  \"$defs\": {\n    \"DataContentEntityOptional\": {\n    \
            \  \"properties\": {\n        \"type\": {\n          \"anyOf\": [\n  \
            \          {\n              \"const\": \"data\",\n              \"type\"\
