        \ endpoint is designed for infinite scroll UIs where new messages may arrive\n\
        while paginating through older ones.\n\nArgs:\n    task_id: The task ID to\
        \ filter messages by\n    limit: Maximum number of messages to return (default:\
        \ 50)\n    cursor: Opaque cursor string for pagination. Pass the `next_cursor`\
        \ from\n            a previous response to get the next page.\n    direction:\
        \ Pagination direction - \"older\" to get older messages (default),\n    \
        \           \"newer\" to get newer messages.\n\nReturns:\n    PaginatedMessagesResponse\
        \ with:\n    - data: List of messages (newest first when direction=\"older\"\
        )\n    - next_cursor: Cursor for fetching the next page (null if no more pages)\n\
        \    - has_more: Whether there are more messages to fetch\n\nExample:\n  \
        \  First request: GET /messages/paginated?task_id=xxx&limit=50\n    Next page:\
        \ GET /messages/paginated?task_id=xxx&limit=50&cursor=<next_cursor>"
