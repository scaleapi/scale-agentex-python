      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: direction
        in: query
        required: false
        schema:
          enum:
          - older
          - newer
          type: string
          default: older
          title: Direction
