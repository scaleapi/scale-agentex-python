    CreateTaskMessageRequest:
      properties:
        task_id:
          type: string
          title: The unique id of the task to send the message to
        content:
          $ref: '#/components/schemas/TaskMessageContent'
          title: The message to send to the task.
        streaming_status:
          anyOf:
          - type: string
            enum:
            - IN_PROGRESS
            - DONE
          - type: 'null'
          title: The streaming status of the message
        created_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Optional caller-supplied creation timestamp
          description: Optional timestamp for the message. Workflow callers should
            pass workflow.now() (Temporal's deterministic monotonic clock) so that
            two awaited messages.create calls from the same workflow are guaranteed
            to have monotonic timestamps regardless of HTTP scheduling at the server.
            If omitted, the server's wall clock at insert time is used.
      type: object
      required:
      - task_id
      - content
      title: CreateTaskMessageRequest
    CreateTaskRequest:
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
          description: 'Optional human-readable name for the task. When set it must
            be globally unique. task/create is get-or-create by name: reusing an existing
            name returns the existing task (with its prior history) instead of creating
            a new one, so omit name (or make it unique, e.g. by appending a UUID)
            whenever each call should produce a fresh task.'
        params:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Params
          description: The parameters for the task. On a get-or-create by name, providing
            params overwrites the existing task's params (it is not a pure read).
        task_metadata:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Task Metadata
          description: Caller-provided metadata to persist on the task row. Only applied
            at task creation; ignored if a task with this name already exists. Forwarded
            to the agent inside the ACP payload for backward compatibility.
      type: object
      title: CreateTaskRequest
    DataContent:
