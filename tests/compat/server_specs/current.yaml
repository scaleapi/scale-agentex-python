      operationId: delete_agent_by_name_agents_name__agent_name__delete
      parameters:
      - name: agent_name
        in: path
        required: true
        schema:
          type: string
          title: Agent Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agents:
    get:
      tags:
      - Agents
      summary: List Agents
      description: List all registered agents, optionally filtered by query parameters.
      operationId: list_agents_agents_get
      parameters:
      - name: task_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Task ID
          title: Task Id
        description: Task ID
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Limit
          default: 50
          title: Limit
        description: Limit
      - name: page_number
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page Number
        description: Page number
      - name: order_by
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Field to order by
          title: Order By
        description: Field to order by
      - name: order_direction
        in: query
        required: false
        schema:
          type: string
          description: Order direction (asc or desc)
          default: desc
          title: Order Direction
        description: Order direction (asc or desc)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
                title: Response List Agents Agents Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agents/register:
    post:
      tags:
      - Agents
      summary: Register Agent
      description: Register a new agent or update an existing one.
      operationId: register_agent_agents_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterAgentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agents/register-build:
    post:
      tags:
      - Agents
      summary: Register Build
      description: Register an agent at build time, before it is deployed, so it can
        be permissioned and shared prior to deploy. Idempotent by name.
      operationId: register_build_agents_register_build_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBuildRequest'
        required: true
      responses:
