    RehydrateTaskRequest:
      properties:
        task_id:
          type: string
          title: Task Id
        messages:
          items:
            $ref: '#/components/schemas/TaskMessageEntity'
          type: array
          title: Messages
        task_states:
          items:
            $ref: '#/components/schemas/StateEntity'
          type: array
          title: Task States
        snapshot_url:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Snapshot Url
          description: Presigned GET URL whose body is a JSON-encoded TaskSnapshotEntity.
            Must be https; must resolve to a public address. When set, messages/task_states
            must be empty.
      type: object
      required:
      - task_id
      title: RehydrateTaskRequest
      description: 'Either provide inline content (messages + task_states) or a snapshot_url

        pointing at a presigned JSON download. Mixing both is rejected.


        The inline form is the canonical shape used by export''s GET response, so

        snapshot → clean → rehydrate round-trips cleanly without serialization

        changes.'
