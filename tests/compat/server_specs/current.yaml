openapi: 3.1.0
info:
  title: Agentex API
  version: 0.1.0
paths:
  /agents/{agent_id}:
    get:
      tags:
      - Agents
      summary: Get Agent by ID
      description: Get an agent by its unique ID.
      operationId: get_agent_by_id_agents__agent_id__get
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Agents
      summary: Delete Agent by ID
      description: Delete an agent by its unique ID.
      operationId: delete_agent_by_id_agents__agent_id__delete
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agents/name/{agent_name}:
    get:
      tags:
      - Agents
