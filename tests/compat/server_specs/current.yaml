          anyOf:
          - type: string
          - type: 'null'
          title: Agent Name
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TaskStatus'
          - type: 'null'
          description: Filter tasks by status (e.g. RUNNING, COMPLETED).
          title: Status
        description: Filter tasks by status (e.g. RUNNING, COMPLETED).
      - name: task_metadata
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'JSON-encoded object used to filter tasks via JSONB containment.
            Example: {"created_by_user_id": "abc-123"}.'
          title: Task Metadata
